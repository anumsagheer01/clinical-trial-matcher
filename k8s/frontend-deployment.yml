apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: clinical-trial-matcher
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: clinical-trial-matcher-frontend:latest
          ports:
            - containerPort: 8501
          env:
            - name: OPENSEARCH_HOST
              value: opensearch
            - name: OPENSEARCH_PORT
              value: "9200"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: clinical-trial-matcher
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 8501
  type: LoadBalancer