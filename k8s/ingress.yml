apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clinical-trial-matcher-ingress
  namespace: clinical-trial-matcher
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: clinical-trial-matcher.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80