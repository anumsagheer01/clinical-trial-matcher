name: CI Pipeline

# Run on every push to main and on pull requests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # Start OpenSearch as a service container for tests
    services:
      opensearch:
        image: opensearchproject/opensearch:2.11.1
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          OPENSEARCH_INITIAL_ADMIN_PASSWORD: MyStr0ng!Pass#2024
          plugins.security.disabled: "true"
          OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
        options: >-
          --health-cmd "curl -s http://localhost:9200"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      # Step 1: Check out the code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Step 3: Cache pip packages (speeds up builds)
      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      # Step 4: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      # Step 5: Run linter (code quality check)
      - name: Lint with ruff
        run: |
          ruff check src/ tests/ --ignore E501,F401,E402

      # Step 6: Wait for OpenSearch to be ready
      - name: Wait for OpenSearch
        run: |
          for i in $(seq 1 30); do
            if curl -s http://localhost:9200 > /dev/null; then
              echo "OpenSearch is ready"
              break
            fi
            echo "Waiting for OpenSearch... ($i/30)"
            sleep 2
          done

      # Step 7: Set up test data and index
      - name: Run tests
        env:
          OPENSEARCH_HOST: localhost
          OPENSEARCH_PORT: 9200
        run: |
          python -m pytest tests/test_classifier.py tests/test_ab_testing.py -v --tb=short || echo "Tests completed"
          
      # Step 8: Run tests
      - name: Run tests
        env:
          OPENSEARCH_HOST: localhost
          OPENSEARCH_PORT: 9200
        run: |
          python -m pytest tests/ -v --tb=short

      # Step 9: Report results
      - name: Test Summary
        if: always()
        run: echo "Tests completed. Check results above."

  # Docker build check (does it build successfully?)
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t clinical-trial-matcher-api .

      - name: Build Frontend Docker image
        run: docker build -f Dockerfile.streamlit -t clinical-trial-matcher-frontend .